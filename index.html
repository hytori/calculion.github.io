<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Cálculo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 8px; box-sizing: border-box; }
        button { background-color: #007BFF; color: white; border: none; cursor: pointer; }
        #resultado { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: green; }
    </style>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

    <h2>Calculadora Cálculo 1</h2>

    <div class="campo">
        <label for="tipo">Escolha a operação:</label>
        <select id="tipo" onchange="toggleLimiteCamp()">
            <option value="derivada">Derivada</option>
            <option value="integral">Integral</option>
            <option value="limite">Limite</option>
        </select>
    </div>

    <div class="campo">
        <label for="funcao">Digite a função (use * para multiplicar e ** para potência):</label>
        <input type="text" id="funcao" placeholder="Ex: x**2 + 3*x">
    </div>

    <div class="campo" id="campo-limite" style="display: none;">
        <label for="alvo">x tende a quanto?</label>
        <input type="text" id="alvo" placeholder="Ex: 0 ou oo (para infinito)">
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
    <button onclick="enviarCalculo()">Calcular</button>

    <button onclick="limparCampos()" style="background-color:#dc3545;">
        Limpar
    </button>
</div>

    <div id="resultado"></div>
    <hr>

<h3>Gráfico da Função</h3>

<div id="grafico" style="width:100%; height:450px;"></div>
<hr>

<h3>Histórico</h3>

<button onclick="limparHistorico()" style="background-color:#6c757d; margin-bottom:10px;">
    Limpar Histórico
</button>

<ul id="historico"></ul>
    <script>
  // Mostra ou esconde o campo do limite
function toggleLimiteCamp() {
    const tipo = document.getElementById("tipo").value;
    const campoLimite = document.getElementById("campo-limite");
    campoLimite.style.display = tipo === "limite" ? "block" : "none";
}

// Envia o cálculo para o Flask
async function enviarCalculo() {

    const tipo = document.getElementById("tipo").value;
    const funcao = document.getElementById("funcao").value;
    const alvo = document.getElementById("alvo").value;
    const divResultado = document.getElementById("resultado");

    divResultado.innerText = "Calculando...";

    try {

        const resposta = await fetch("http://127.0.0.1:5000/calcular", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ tipo, funcao, alvo })
        });

        const dados = await resposta.json();

        if (dados.erro) {

            divResultado.style.color = "red";
            divResultado.innerText = dados.erro;

        } else {

            divResultado.style.color = "green";
            divResultado.innerText = `Resultado: ${dados.resultado}`;

            // Adiciona ao histórico
            adicionarHistorico(tipo, funcao, dados.resultado);

            // Desenha o gráfico
            desenharGrafico(dados.resultado.replace(" + C", ""));
        }

    } catch (erro) {

        divResultado.style.color = "red";
        divResultado.innerText = "Erro ao conectar com o servidor.";

    }
}

// Desenha o gráfico apenas se for Integral
function desenharGrafico(funcao) {
    const tipo = document.getElementById("tipo").value;
    const areaGrafico = document.getElementById("grafico");

    // Condicional: SÓ gera gráfico se o tipo selecionado for 'integral'
    if (tipo === "integral") {
        let x = [];
        let y = [];

        for (let i = -10; i <= 10; i += 0.2) {
            try {
                let expressao = funcao.replaceAll("x", "(" + i + ")");
                let valor = eval(expressao);

                if (isFinite(valor)) {
                    x.push(i);
                    y.push(valor);
                }
            } catch (e) {
                // ignora erros
            }
        }

        Plotly.newPlot("grafico", [{
            x: x,
            y: y,
            mode: "lines",
            type: "scatter"
        }], {
            title: "Gráfico da Função (Resultado da Integral)",
            xaxis: { title: "x" },
            yaxis: { title: "f(x)" }
        });
    } else {
        // Se for derivada ou limite, limpa o gráfico da tela
        Plotly.purge("grafico");
    }
}

// Limpa os campos
function limparCampos() {

    document.getElementById("funcao").value = "";
    document.getElementById("alvo").value = "";
    document.getElementById("resultado").innerText = "";

    Plotly.purge("grafico");

    document.getElementById("funcao").focus();
}

// Adiciona um cálculo ao histórico
function adicionarHistorico(tipo, funcao, resultado) {

    const historico = document.getElementById("historico");

    const item = document.createElement("li");

    item.innerHTML =
        "<strong>" + tipo.toUpperCase() + "</strong><br>" +
        "Função: " + funcao + "<br>" +
        "Resultado: " + resultado;

    historico.prepend(item);
}

// Limpa todo o histórico
function limparHistorico() {

    document.getElementById("historico").innerHTML = "";

}
    </script>
</body>
</html>
